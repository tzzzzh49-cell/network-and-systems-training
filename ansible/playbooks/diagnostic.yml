---
- name: Diagnostic local read-only
  hosts: localhost
  gather_facts: true
  vars:
    project_root: "{{ playbook_dir | dirname | dirname }}"
    report_dir: "{{ project_root }}/outputs/reports"
    report_file: "{{ report_dir }}/ansible-diagnostic-local.md"

  tasks:
    - name: Créer le dossier de rapports
      ansible.builtin.file:
        path: "{{ report_dir }}"
        state: directory
        mode: "0755"

    - name: Récupérer le nom de la machine
      ansible.builtin.command: hostname
      register: hostname_result
      changed_when: false

    - name: Récupérer les routes réseau
      ansible.builtin.command: ip route
      register: routes_result
      changed_when: false
      failed_when: false

    - name: Récupérer les ports ouverts
      ansible.builtin.command: ss -tulpn
      register: ports_result
      changed_when: false
      failed_when: false

    - name: Tester l'API locale /health
      ansible.builtin.uri:
        url: http://127.0.0.1:8000/health
        method: GET
        return_content: true
        status_code: 200
      register: api_health
      failed_when: false
      changed_when: false

    - name: Écrire un rapport Ansible simple
      ansible.builtin.copy:
        dest: "{{ report_file }}"
        mode: "0644"
        content: |
          # Rapport Ansible local

          ## Machine

          {{ hostname_result.stdout }}

          ## Système

          Distribution : {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}
          Kernel : {{ ansible_facts.kernel }}

          ## Routes réseau

          {{ routes_result.stdout if routes_result.stdout else routes_result.stderr | default("Indisponible") }}

          ## Ports ouverts

          {{ ports_result.stdout if ports_result.stdout else ports_result.stderr | default("Indisponible") }}

          ## API /health

          Statut HTTP : {{ api_health.status | default("indisponible") }}

          Réponse :

          {{ api_health.content | default("Aucune réponse") }}

          ## Conclusion

          Ce rapport a été généré par Ansible en local.

          Rapport généré ici :

          {{ report_file }}
